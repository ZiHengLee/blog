syntax = "proto3";

package blog.blog;

option go_package = "blog/x/blog/types";

// Msg defines the Msg service.
service Msg {
  rpc BuyName (MsgBuyName) returns (MsgBuyNameResponse);
}
message MsgBuyName {
  string creator = 1;
  string name    = 2;
  string bid     = 3;
}

message MsgBuyNameResponse {}

